name: Auto Tag on Version Bump

on:
  push:
    branches: [main]
    paths:
      - Cargo.toml

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Extract version
        id: v
        run: |
          SEMVER=$(grep -m1 '^version\s*=' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          MAJOR="${SEMVER%%.*}"
          MINOR_RAW=$(echo "$SEMVER" | cut -d. -f2)
          VERSION="${MAJOR}.$(printf '%02d' $MINOR_RAW)"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          git tag | grep -qx "v$VERSION" && echo "is_new=false" >> $GITHUB_OUTPUT || echo "is_new=true" >> $GITHUB_OUTPUT
      - name: Create release
        if: steps.v.outputs.is_new == 'true'
        run: |
          gh release create "v${{ steps.v.outputs.version }}" \
            --title "v${{ steps.v.outputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
