name: Auto Tag on Version Bump

on:
  push:
    branches: [main]
    paths:
      - Cargo.toml

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Extract version
        id: v
        run: |
          SEMVER=$(grep -m1 '^version\s*=' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          if [[ ! "$SEMVER" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Cargo.toml version '$SEMVER' is not semver (X.Y.Z)"
            exit 1
          fi
          echo "version=$SEMVER" >> $GITHUB_OUTPUT
          git tag | grep -qx "v$SEMVER" && echo "is_new=false" >> $GITHUB_OUTPUT || echo "is_new=true" >> $GITHUB_OUTPUT
      - name: Create release
        if: steps.v.outputs.is_new == 'true'
        run: |
          gh release create "v${{ steps.v.outputs.version }}" \
            --title "v${{ steps.v.outputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
